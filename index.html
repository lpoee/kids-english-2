<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Kids English 2.0 bilingual phrase player.">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Kids English 2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,system-ui,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{background:linear-gradient(135deg,#0c1929,#1a365d,#234e52);color:#fff;transition:background .6s}
body.greeting-bg{background:linear-gradient(135deg,#0c1929,#1a365d,#234e52)}
body.manners-bg{background:linear-gradient(135deg,#1a0a2e,#4a1942,#6b1d4a)}
body.routine-bg{background:linear-gradient(135deg,#0a1f1a,#1a4731,#2d6a4f)}
body.instruction-bg{background:linear-gradient(135deg,#0e1a2e,#1a3a4e,#0e2a3e)}
body.play-bg{background:linear-gradient(135deg,#1a1a2e,#2a2a4e,#1e1e3a)}
button{font:inherit}
button:focus-visible,#video-card:focus-visible,#word-text:focus-visible{outline:3px solid rgba(255,215,0,.65);outline-offset:3px}
#app{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;position:relative;padding:6px;overflow:hidden}
#tabs{display:flex;gap:6px;flex-shrink:0;flex-wrap:nowrap;justify-content:flex-start;width:100%;max-width:720px;padding:4px 0 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;z-index:10}
#tabs::-webkit-scrollbar{display:none}
.tab{border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.52);font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;border-radius:14px;padding:7px 11px;border:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab.active{border-color:#ffd700;background:rgba(255,215,0,.16);color:#ffd700;box-shadow:0 0 20px rgba(255,215,0,.18)}
.tab:active{transform:scale(.93)}
#main-area{flex:1;width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;min-height:0}
#video-card{width:380px;height:260px;max-width:calc(100vw - 76px);border-radius:24px;background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:3px solid rgba(255,255,255,.09);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;z-index:5;box-shadow:0 16px 48px rgba(0,0,0,.32)}
#video-card:active{transform:scale(.96)}
#video{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:cover;background:#07101a}
#video-card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 48%,rgba(0,0,0,.55));pointer-events:none}
#play-dot{position:absolute;right:14px;top:14px;width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,.72);background:rgba(255,255,255,.12);display:grid;place-items:center;color:#fff;font-size:20px;z-index:8;backdrop-filter:blur(6px)}
#word-text{font-family:'Fredoka One',cursive;font-size:54px;font-weight:800;text-align:center;line-height:1.05;margin:10px 0 0;z-index:10;cursor:pointer;transition:all .25s;letter-spacing:0;background:linear-gradient(135deg,#ff9ff3,#feca57,#7bed9f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 4px 8px rgba(255,215,0,.24))}
#word-text:active{transform:scale(.94)}
#word-text.pop{animation:textPop .45s ease-out}
@keyframes textPop{0%{transform:scale(.8)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
#cn-text{font-size:30px;font-weight:900;line-height:1.1;margin-top:2px;color:#fff;text-shadow:0 3px 14px rgba(0,0,0,.34);z-index:10}
.arrow{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;font-size:20px;color:rgba(255,255,255,.5);transition:all .2s}
.arrow:active{background:rgba(255,215,0,.2);border-color:#ffd700;color:#ffd700;transform:translateY(-50%) scale(.84)}
#arrow-left{left:0}
#arrow-right{right:0}
#counter{color:rgba(255,255,255,.36);font-size:12px;flex-shrink:0;cursor:default;padding:6px 16px;border-radius:14px;margin-top:2px;z-index:10}
#counter span{color:#ffd700;font-weight:800;font-size:15px}
#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(130%);background:rgba(255,255,255,.92);color:#102030;border-radius:16px;padding:10px 14px;font-size:14px;font-weight:800;z-index:50;transition:transform .18s;box-shadow:0 12px 32px rgba(0,0,0,.28)}
#toast.show{transform:translateX(-50%) translateY(0)}
#error{min-height:100%;display:grid;place-items:center;padding:20px;color:#fecaca;font-weight:800;text-align:center}
@media(max-width:420px){
  #app{padding:4px 6px}
  #tabs{gap:4px}
  .tab{font-size:10px;padding:6px 9px}
  #video-card{width:248px;height:248px;border-radius:24px;max-width:calc(100vw - 78px)}
  #word-text{font-size:46px;margin-top:8px}
  #cn-text{font-size:30px}
  .arrow{width:42px;height:42px}
}
@media(max-height:660px){
  #video-card{width:230px;height:230px}
  #word-text{font-size:40px;margin-top:6px}
  #cn-text{font-size:25px}
  .tab{padding-top:5px;padding-bottom:5px}
}
</style>
</head>
<body class="greeting-bg">
<div id="app">
  <div id="tabs" aria-label="Phrase cards"></div>
  <div id="main-area">
    <button class="arrow" id="arrow-left" aria-label="Previous card">◀</button>
    <div id="video-card" role="button" tabindex="0" aria-label="Play phrase">
      <video id="video" muted loop playsinline preload="auto"></video>
      <div id="play-dot">▶</div>
    </div>
    <div id="word-text" role="button" tabindex="0"></div>
    <div id="cn-text"></div>
    <button class="arrow" id="arrow-right" aria-label="Next card">▶</button>
  </div>
  <div id="counter"><span id="idx-num">1</span> / <span id="total-num">10</span></div>
</div>
<div id="toast">▶</div>
<script>
const state = {cards: [], index: 0, audio: null, cnTimer: null, toastTimer: null, playbackId: 0};
const $ = id => document.getElementById(id);

async function loadCards() {
  const response = await fetch('data/kids_english_2_cards.json?v=2');
  if (!response.ok) throw new Error('Unable to load Kids English 2.0 card data');
  const data = await response.json();
  state.cards = data.cards;
  $('total-num').textContent = state.cards.length;
  renderTabs();
  render();
}

function currentCard() {
  return state.cards[state.index];
}

function bgClass(card) {
  const category = (card.category || '').toLowerCase();
  if (category.includes('manner')) return 'manners-bg';
  if (category.includes('routine')) return 'routine-bg';
  if (category.includes('instruction')) return 'instruction-bg';
  if (category.includes('play')) return 'play-bg';
  return 'greeting-bg';
}

function renderTabs() {
  $('tabs').innerHTML = state.cards.map((card, index) => `
    <button class="tab${index === state.index ? ' active' : ''}" data-index="${index}">
      ${index + 1}. ${card.english}
    </button>
  `).join('');
  $('tabs').querySelectorAll('button').forEach(button => {
    button.addEventListener('click', () => {
      stopAudio();
      state.index = Number(button.dataset.index);
      render();
    });
  });
}

function render() {
  const card = currentCard();
  if (!card) return;
  document.body.className = bgClass(card);
  const video = $('video');
  video.poster = card.poster;
  video.src = card.video + '?v=2';
  video.play().catch(() => {});
  $('word-text').textContent = card.english;
  $('cn-text').textContent = card.chinese;
  $('idx-num').textContent = state.index + 1;
  $('play-dot').textContent = '▶';
  renderTabs();
  requestAnimationFrame(() => {
    const active = $('tabs').querySelector('.tab.active');
    if (active) active.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  });
}

function stopAudio() {
  state.playbackId += 1;
  if (state.audio) {
    state.audio.pause();
    state.audio.currentTime = 0;
    state.audio = null;
  }
  if (state.cnTimer) {
    clearTimeout(state.cnTimer);
    state.cnTimer = null;
  }
  $('play-dot').textContent = '▶';
}

function playFile(path, playbackId) {
  return new Promise((resolve, reject) => {
    if (playbackId !== state.playbackId) {
      reject(new Error('stale playback'));
      return;
    }
    const audio = new Audio(path);
    state.audio = audio;
    audio.onended = () => {
      if (playbackId === state.playbackId) resolve();
    };
    audio.onerror = reject;
    audio.play().catch(reject);
  });
}

function waitForChinese(playbackId) {
  return new Promise(resolve => {
    state.cnTimer = setTimeout(() => {
      state.cnTimer = null;
      if (playbackId === state.playbackId) resolve();
    }, 350);
  });
}

async function playCard(event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const card = currentCard();
  if (!card) return;
  stopAudio();
  const playbackId = state.playbackId;
  showToast();
  $('play-dot').textContent = '●';
  $('word-text').classList.remove('pop');
  void $('word-text').offsetWidth;
  $('word-text').classList.add('pop');
  try {
    await playFile(card.audio_en, playbackId);
    await waitForChinese(playbackId);
    await playFile(card.audio_cn, playbackId);
  } catch (error) {
    if (playbackId === state.playbackId) console.warn(error);
  } finally {
    if (playbackId === state.playbackId) {
      state.audio = null;
      $('play-dot').textContent = '▶';
    }
  }
}

function showToast() {
  const toast = $('toast');
  toast.classList.add('show');
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
}

function move(delta) {
  stopAudio();
  state.index = (state.index + delta + state.cards.length) % state.cards.length;
  render();
}

$('arrow-left').addEventListener('click', () => move(-1));
$('arrow-right').addEventListener('click', () => move(1));
$('video-card').addEventListener('click', playCard);
$('word-text').addEventListener('click', playCard);
$('video-card').addEventListener('keydown', event => {
  if (event.key === 'Enter' || event.key === ' ') playCard(event);
});
$('word-text').addEventListener('keydown', event => {
  if (event.key === 'Enter' || event.key === ' ') playCard(event);
});
document.addEventListener('keydown', event => {
  if (event.key === 'ArrowLeft') move(-1);
  if (event.key === 'ArrowRight') move(1);
  if (event.key === ' ') {
    event.preventDefault();
    playCard();
  }
});

loadCards().catch(error => {
  document.body.innerHTML = `<main id="error">${error.message}</main>`;
});
</script>
</body>
</html>
