<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="description" content="Kids English 2.0 is a bilingual preschool phrase player with short videos and English-then-Chinese audio.">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Kids English 2.0</title>
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --bg:#080d12;
  --panel:#111922;
  --panel-soft:#172331;
  --ink:#f7fbff;
  --muted:#9fb0c3;
  --line:rgba(255,255,255,.12);
  --line-strong:rgba(255,255,255,.22);
  --accent:#58cc02;
  --accent-dark:#3f9700;
  --gold:#ffc83d;
  --shadow:rgba(0,0,0,.38);
}
html,body{
  margin:0;
  min-height:100%;
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--ink);
}
body{
  overflow-x:hidden;
  background:
    radial-gradient(circle at 18% 8%,rgba(88,204,2,.14),transparent 28%),
    radial-gradient(circle at 80% 0,rgba(255,200,61,.12),transparent 24%),
    linear-gradient(180deg,#080d12 0%,#101720 54%,#0d160d 100%);
}
button{font:inherit}
button:focus-visible,.card-tab:focus-visible,.icon-btn:focus-visible,.video-card:focus-visible,summary:focus-visible{
  outline:3px solid rgba(158,216,255,.5);
  outline-offset:3px;
}
.app{
  min-height:100dvh;
  display:grid;
  grid-template-columns:280px minmax(0,1fr);
}
.rail{
  min-height:100dvh;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:16px;
  border-right:1px solid var(--line);
  background:rgba(8,13,18,.78);
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:850;
  font-size:18px;
}
.brand-mark{
  width:34px;
  height:34px;
  border-radius:9px;
  display:grid;
  place-items:center;
  background:var(--gold);
  color:#3a2900;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.18);
  font-weight:900;
}
.meta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.meta div{
  border:1px solid var(--line);
  background:var(--panel);
  border-radius:8px;
  padding:10px;
}
.meta strong{
  display:block;
  font-size:18px;
  line-height:1;
}
.meta span{
  display:block;
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
}
.list{
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow:auto;
  padding-right:4px;
}
.card-tab{
  min-width:0;
  border:1px solid var(--line);
  background:rgba(17,25,34,.82);
  border-radius:8px;
  padding:10px 12px;
  color:var(--ink);
  text-align:left;
  cursor:pointer;
  display:grid;
  gap:3px;
  transition:transform .12s ease,border-color .12s ease,background .12s ease;
}
.card-tab:hover{
  transform:translateY(-1px);
  border-color:var(--line-strong);
}
.card-tab.active{
  background:var(--accent);
  color:#101820;
  border-color:var(--accent);
}
.card-tab small{
  color:var(--muted);
  font-size:12px;
}
.card-tab.active small{
  color:#163100;
}
.stage{
  min-height:100dvh;
  padding:22px;
  display:grid;
  grid-template-rows:auto minmax(0,1fr) auto;
  gap:18px;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.title h1{
  margin:0;
  font-size:42px;
  line-height:1;
  letter-spacing:0;
}
.title p{
  margin:8px 0 0;
  max-width:58ch;
  color:var(--muted);
  font-size:15px;
  line-height:1.4;
}
.controls{
  display:flex;
  gap:8px;
  align-items:center;
}
.icon-btn{
  width:46px;
  height:46px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--ink);
  cursor:pointer;
  display:grid;
  place-items:center;
  font-size:20px;
  font-weight:850;
}
.icon-btn:active{
  transform:scale(.97);
}
.viewer{
  min-height:0;
  display:grid;
  grid-template-columns:minmax(280px,1fr) 340px;
  gap:18px;
  align-items:stretch;
}
.video-card{
  min-height:360px;
  border-radius:10px;
  background:#070b12;
  border:1px solid var(--line-strong);
  position:relative;
  overflow:hidden;
  display:grid;
  cursor:pointer;
  box-shadow:0 26px 60px var(--shadow);
}
video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  background:#070b12;
}
.video-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,0) 42%,rgba(0,0,0,.76));
  pointer-events:none;
}
.phrase{
  position:absolute;
  left:22px;
  right:22px;
  bottom:18px;
  z-index:1;
  color:#fff;
  display:grid;
  gap:8px;
}
.phrase .en{
  font-size:76px;
  font-weight:900;
  line-height:.96;
  letter-spacing:0;
  text-shadow:0 4px 18px rgba(0,0,0,.42);
}
.phrase .cn{
  width:max-content;
  max-width:100%;
  border-radius:10px;
  background:rgba(247,251,255,.92);
  color:#101820;
  padding:5px 11px;
  font-size:38px;
  font-weight:850;
}
.play-ring{
  position:absolute;
  top:18px;
  right:18px;
  z-index:2;
  width:54px;
  height:54px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.78);
  background:rgba(255,255,255,.14);
  color:#fff;
  display:grid;
  place-items:center;
  font-size:22px;
  backdrop-filter:blur(6px);
}
.detail{
  border:1px solid var(--line);
  border-radius:10px;
  background:rgba(17,25,34,.88);
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:0;
}
.detail h2{
  margin:0;
  font-size:28px;
  line-height:1.1;
  letter-spacing:0;
}
.translation{
  font-size:24px;
  font-weight:850;
}
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chip{
  background:rgba(88,204,2,.12);
  border:1px solid rgba(88,204,2,.32);
  color:#dff9d8;
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:750;
}
details{
  margin-top:auto;
  border-top:1px solid var(--line);
  padding-top:12px;
}
summary{
  cursor:pointer;
  color:var(--muted);
  font-size:13px;
  font-weight:750;
}
.prompt{
  max-height:124px;
  overflow:auto;
  margin-top:10px;
  border:1px solid var(--line);
  background:#0b1118;
  border-radius:8px;
  padding:12px;
  color:#b8c6d7;
  font-size:13px;
  line-height:1.45;
}
.prompt b{
  display:block;
  color:var(--ink);
  margin-bottom:6px;
}
.footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  color:var(--muted);
  font-size:13px;
}
.progress{
  height:10px;
  background:rgba(255,255,255,.12);
  border-radius:999px;
  overflow:hidden;
  flex:1;
  max-width:360px;
}
.bar{
  height:100%;
  width:10%;
  background:var(--accent);
  border-radius:999px;
  transition:width .2s ease;
}
.toast{
  position:fixed;
  left:50%;
  bottom:20px;
  z-index:20;
  transform:translateX(-50%) translateY(120%);
  background:#f7fbff;
  color:#101820;
  border-radius:10px;
  padding:10px 14px;
  font-size:14px;
  font-weight:750;
  transition:transform .18s ease;
  box-shadow:0 12px 32px rgba(0,0,0,.28);
}
.toast.show{
  transform:translateX(-50%) translateY(0);
}
.error-state{
  min-height:100dvh;
  display:grid;
  place-items:center;
  padding:24px;
  color:#fecaca;
  background:#160c0a;
  font:700 16px/1.5 Inter,sans-serif;
}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .rail{
    min-height:auto;
    border-right:0;
    border-bottom:1px solid var(--line);
    padding:12px;
  }
  .list{
    display:grid;
    grid-auto-flow:column;
    grid-auto-columns:minmax(150px,1fr);
    overflow-x:auto;
    padding-bottom:4px;
  }
  .stage{
    min-height:auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .topbar{align-items:flex-start}
  .title h1{font-size:34px}
  .viewer{grid-template-columns:1fr}
  .video-card{min-height:auto;aspect-ratio:3/2}
  .detail{display:none}
}
@media(max-width:520px){
  .topbar{
    display:grid;
    gap:12px;
  }
  .controls{
    width:max-content;
  }
  .controls{
    padding:6px;
    border:1px solid var(--line);
    border-radius:12px;
    background:rgba(8,13,18,.78);
    backdrop-filter:blur(10px);
  }
  .phrase{
    left:14px;
    right:14px;
    bottom:14px;
  }
  .phrase .en{font-size:48px}
  .phrase .cn{font-size:30px}
  .video-card{
    min-height:0;
    height:260px;
    aspect-ratio:auto;
  }
  .play-ring{
    width:46px;
    height:46px;
    top:12px;
    right:12px;
  }
}
</style>
</head>
<body>
<main class="app">
  <aside class="rail">
    <div class="brand"><div class="brand-mark">2.0</div><span>Kids English</span></div>
    <div class="meta">
      <div><strong id="total-count">10</strong><span>phrase cards</span></div>
      <div><strong>4-5</strong><span>age target</span></div>
    </div>
    <nav class="list" id="card-list" aria-label="Cards"></nav>
  </aside>
  <section class="stage">
    <div class="topbar">
      <div class="title">
        <h1 id="page-title">Hello!</h1>
        <p>Tap the video card to hear English first, then Chinese.</p>
      </div>
      <div class="controls" aria-label="Lesson controls">
        <button class="icon-btn" id="prev" aria-label="Previous card">‹</button>
        <button class="icon-btn" id="play" aria-label="Play audio">▶</button>
        <button class="icon-btn" id="next" aria-label="Next card">›</button>
      </div>
    </div>
    <div class="viewer">
      <article class="video-card" id="tap-card" aria-label="Tap to play phrase audio" tabindex="0">
        <video id="video" muted loop playsinline preload="auto"></video>
        <div class="play-ring" id="play-state">▶</div>
        <div class="phrase">
          <div class="en" id="phrase-en"></div>
          <div class="cn" id="phrase-cn"></div>
        </div>
      </article>
      <aside class="detail">
        <h2 id="detail-en"></h2>
        <div class="translation" id="detail-cn"></div>
        <div class="chips">
          <span class="chip" id="detail-category"></span>
          <span class="chip">English then Chinese</span>
        </div>
        <details>
          <summary>Grown-ups</summary>
          <div class="prompt"><b>Video prompt</b><span id="detail-prompt"></span></div>
          <div class="prompt"><b>Negative prompt</b><span id="detail-negative"></span></div>
        </details>
      </aside>
    </div>
    <div class="footer">
      <span id="counter">1 / 10</span>
      <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
      <span>Kids English 2.0</span>
    </div>
  </section>
</main>
<div class="toast" id="toast">Playing English, then Chinese</div>
<script>
const state = {cards: [], index: 0, audio: null, cnTimer: null, toastTimer: null, playbackId: 0};
const $ = id => document.getElementById(id);

async function loadCards() {
  const response = await fetch('data/kids_english_2_cards.json?v=2');
  if (!response.ok) throw new Error('Unable to load Kids English 2.0 card data');
  const data = await response.json();
  state.cards = data.cards;
  $('total-count').textContent = data.cards.length;
  renderList();
  render();
}

function currentCard() {
  return state.cards[state.index];
}

function renderList() {
  $('card-list').innerHTML = state.cards.map((card, index) => `
    <button class="card-tab${index === state.index ? ' active' : ''}" data-index="${index}" ${index === state.index ? 'aria-current="true"' : ''}>
      <span>${index + 1}. ${card.english}</span>
      <small>${card.chinese}</small>
    </button>
  `).join('');
  $('card-list').querySelectorAll('button').forEach(button => {
    button.addEventListener('click', () => {
      stopAudio();
      state.index = Number(button.dataset.index);
      render();
    });
  });
}

function render() {
  const card = currentCard();
  if (!card) return;
  const video = $('video');
  video.poster = card.poster;
  video.src = card.video + '?v=2';
  video.play().catch(() => {});
  $('page-title').textContent = card.english;
  $('phrase-en').textContent = card.english;
  $('phrase-cn').textContent = card.chinese;
  $('detail-en').textContent = card.english;
  $('detail-cn').textContent = card.chinese;
  $('detail-category').textContent = card.category;
  $('detail-prompt').textContent = card.prompt;
  $('detail-negative').textContent = card.negative_prompt;
  $('counter').textContent = `${state.index + 1} / ${state.cards.length}`;
  $('bar').style.width = `${((state.index + 1) / state.cards.length) * 100}%`;
  renderList();
}

function stopAudio() {
  state.playbackId += 1;
  if (state.audio) {
    state.audio.pause();
    state.audio.currentTime = 0;
    state.audio = null;
  }
  if (state.cnTimer) {
    clearTimeout(state.cnTimer);
    state.cnTimer = null;
  }
  $('play-state').textContent = '▶';
  $('play').textContent = '▶';
}

function playFile(path, playbackId) {
  return new Promise((resolve, reject) => {
    if (playbackId !== state.playbackId) {
      reject(new Error('stale playback'));
      return;
    }
    const audio = new Audio(path);
    state.audio = audio;
    audio.onended = () => {
      if (playbackId === state.playbackId) resolve();
    };
    audio.onerror = reject;
    audio.play().catch(reject);
  });
}

function waitForChinese(playbackId) {
  return new Promise(resolve => {
    state.cnTimer = setTimeout(() => {
      state.cnTimer = null;
      if (playbackId === state.playbackId) resolve();
    }, 350);
  });
}

async function playCard(event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const card = currentCard();
  if (!card) return;
  stopAudio();
  const playbackId = state.playbackId;
  showToast();
  $('play-state').textContent = '●';
  $('play').textContent = '●';
  try {
    await playFile(card.audio_en, playbackId);
    await waitForChinese(playbackId);
    await playFile(card.audio_cn, playbackId);
  } catch (error) {
    if (playbackId === state.playbackId) console.warn(error);
  } finally {
    if (playbackId === state.playbackId) {
      state.audio = null;
      $('play-state').textContent = '▶';
      $('play').textContent = '▶';
    }
  }
}

function showToast() {
  const toast = $('toast');
  toast.classList.add('show');
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
}

function move(delta) {
  stopAudio();
  state.index = (state.index + delta + state.cards.length) % state.cards.length;
  render();
}

$('prev').addEventListener('click', () => move(-1));
$('next').addEventListener('click', () => move(1));
$('play').addEventListener('click', playCard);
$('tap-card').addEventListener('click', playCard);
$('tap-card').addEventListener('keydown', event => {
  if (event.key === 'Enter' || event.key === ' ') playCard(event);
});
document.addEventListener('keydown', event => {
  if (event.key === 'ArrowLeft') move(-1);
  if (event.key === 'ArrowRight') move(1);
  if (event.key === ' ') {
    event.preventDefault();
    playCard();
  }
});
loadCards().catch(error => {
  document.body.innerHTML = `<main class="error-state">${error.message}</main>`;
});
</script>
</body>
</html>
